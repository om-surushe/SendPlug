name: CI

on:
  push:
    branches: [main, "revamp/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm run build
        working-directory: web

      - name: Build production image
        run: docker build -t sendplug:${{ github.sha }} .

  bun-foundation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: sendplug
          POSTGRES_USER: sendplug
          POSTGRES_PASSWORD: localtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sendplug -d sendplug"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      API_HOST: 127.0.0.1
      API_PORT: 13000
      DATABASE_URL: postgresql://sendplug:localtest@127.0.0.1:5432/sendplug?schema=public
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run db:validate
      - run: bun run db:generate
      - run: bunx --bun prisma migrate deploy
        working-directory: packages/database
      - run: bun run typecheck
      - run: bun test apps/api/test/app.test.ts packages/contracts/test/email-job.test.ts
      - run: bun test test/prisma.integration.test.ts
        working-directory: packages/database
      - name: Verify Elysia runtime health
        run: |
          bun apps/api/src/index.ts >/tmp/sendplug-bun-api.log 2>&1 &
          pid=$!
          trap 'kill $pid 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:13000/health | grep -q '"healthy"' && exit 0
            sleep 1
          done
          cat /tmp/sendplug-bun-api.log
          exit 1
      - run: bun run build
