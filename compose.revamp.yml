name: sendplug-revamp

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sendplug
      POSTGRES_USER: sendplug
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - sendplug-postgres-revamp:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sendplug -d sendplug"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis-revamp:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - sendplug-redis-revamp:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  sendplug-postgres-revamp:
  sendplug-redis-revamp:
