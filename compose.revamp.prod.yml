name: sendplug-revamp

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sendplug
      POSTGRES_USER: sendplug
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - sendplug-postgres-revamp:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sendplug -d sendplug"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - sendplug-redis-revamp:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.revamp-api
    env_file:
      - /home/ubuntu/sendplug-revamp.env
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: postgresql://sendplug:${POSTGRES_PASSWORD}@postgres:5432/sendplug?schema=public
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8100:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  sendplug-postgres-revamp:
  sendplug-redis-revamp:
